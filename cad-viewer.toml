# cad-viewer — registre explicite des pièces build123d.
# Lancé une fois :  uv run --project server cad-viewer-serve --config ./cad-viewer.toml
# Laisser tourner ; N instances Claude Code branchent http://localhost:32325/mcp.

[server]
host = "0.0.0.0"   # la tablette (LAN/Tailscale) doit joindre ; MCP via localhost
port = 32325

# Stealth Scout — K3 SCOUT clone, RC scale (Fleet boat #3).
# Listé en PREMIER pour que la dédup par chemin absolu (cf. config.py) prenne
# ces fichiers ici, et que le glob my_fleet suivant les ignore → ils
# apparaissent SOUS leur propre catégorie « stealth_scout » dans le sidebar
# tablette au lieu d'être noyés sous « boat ». Liste explicite = seuls les
# vrais modèles CAD (les helpers extract_svg / generate_design restent
# visibles sous « boat » via my_fleet, ou peuvent être migrés si on veut les
# cacher complètement).
[[project]]
name = "stealth_scout"
root = "/Users/wq/Project/bascanada/my_fleet/cad/parts/boat/stealth_scout"
parts = [
    "hull.py",
    "hull_shell.py",
    "superstructure.py",
    "thruster_mounts.py",
    "sealed_compartment.py",
    "deck_openings.py",
    "stealth_scout_split.py",
    "stealth_scout.py",
]

[[project]]
name = "my_fleet"
root = "/Users/wq/Project/bascanada/my_fleet/cad"
# Auto-découverte : toutes les pièces sous parts/ (les __init__.py sont
# ignorés). Build lazy : une pièce n'est construite qu'à sa 1re ouverture.
glob = "parts/**/*.py"
# parts = [ ... ]   # liste explicite encore possible (union avec glob, dédup)
