# cad-viewer — instance unique long-vivante (OrbStack / Docker).
#
# Démarrage :   docker compose up -d --build
# Logs    :     docker compose logs -f
# OrbStack relancera le conteneur automatiquement (restart: unless-stopped).
#
# Tablette → http://<mac-LAN-or-tailscale-ip>:32325
# Claude   → ~/.claude.json déjà à http://localhost:32325/mcp/ — inchangé,
#            OrbStack publie 32325 sur le host.

services:
  cad-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cad-viewer:latest
    container_name: cad-viewer
    # cadquery-ocp ne publie pas de wheel linux/arm64 — on tourne en
    # linux/amd64 via Rosetta (supporté nativement par OrbStack/Apple Silicon).
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "32325:32325"
    volumes:
      # Bind-mount au MÊME chemin host = container → le cad-viewer.toml
      # (root = /Users/wq/...) marche pareil pour `make serve` et Docker.
      - /Users/wq/Project/bascanada/my_fleet/cad:/Users/wq/Project/bascanada/my_fleet/cad:ro
      # Pièces de démo livrées avec cad-viewer (même chemin host=container).
      - /Users/wq/Project/bascanada/cad-viewer/examples:/Users/wq/Project/bascanada/cad-viewer/examples:ro
      # Le fichier de config VIT DANS my_fleet (versionné avec les pièces qu'il
      # déclare) → monté en lecture seule depuis là. Le CMD pointe /app/cad-viewer.toml.
      - /Users/wq/Project/bascanada/my_fleet/cad/cad-viewer.toml:/app/cad-viewer.toml:ro
      # Données persistantes (bibliothèque d'images de référence) — survit aux
      # rebuilds d'image. Visible/éditable sur l'hôte sous ./.cad-data.
      - ./.cad-data:/data
    environment:
      # Filet de sécurité watcher si jamais virtiofs+inotify pose problème
      # (active le polling — léger coût CPU). Décommente si live-reload muet.
      # WATCHFILES_FORCE_POLLING: "true"
      PYTHONUNBUFFERED: "1"
      # Racine des données persistantes (cf. references.ReferenceStore).
      CAD_VIEWER_DATA: "/data"
      # Nb de process de build parallèles (cf. procbuild.BuildPool). Chaque
      # worker charge OCP (~plusieurs centaines de Mo, + lent sous Rosetta) →
      # plafonné pour borner la RAM. Ajuste selon les cœurs/RAM dispo.
      CAD_VIEWER_BUILD_WORKERS: "4"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:32325/api/parts',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 20s
